[
  {
    "slug": "contact-form",
    "number": "01",
    "title": "AWS Contact Form",
    "tag": "LIVE · IN PRODUCTION",
    "cardCta": "Live · write-up",
    "blurb": "A contact form I actually rely on, validated in Lambda before a single email goes out.",
    "stack": "API Gateway · Lambda · SES · CloudWatch · Amplify",
    "tagline": "A contact form that runs on nothing, no servers, just AWS services wired together. It's the real channel linked from my LinkedIn.",
    "repo": "https://github.com/nsepvo/aws-serverless-contact-form",
    "demo": "https://staging.d2vpf59fscl1pp.amplifyapp.com/",
    "overview": "This was my first AWS project, built to learn the core services by shipping something I'd actually keep using. It takes a form submission, validates it, and emails me, with zero servers to manage and nothing to patch.",
    "services": [
      {
        "name": "AWS Amplify",
        "role": "Hosts the frontend and redeploys automatically on every push."
      },
      {
        "name": "API Gateway",
        "role": "Public REST endpoint with burst rate limits at the edge."
      },
      {
        "name": "AWS Lambda",
        "role": "Validates every field in Python before anything else runs."
      },
      {
        "name": "Amazon SES",
        "role": "Delivers the validated submission as an email."
      },
      {
        "name": "CloudWatch",
        "role": "Logs every execution for after-the-fact diagnostics."
      }
    ],
    "flow": [
      {
        "heading": "A submission, end to end",
        "steps": [
          "The frontend sends a POST request to API Gateway.",
          "API Gateway applies burst rate limits, then hands off to Lambda.",
          "Lambda validates the fields, rejecting malformed input early.",
          "Valid data is passed to Amazon SES.",
          "SES delivers the email to my verified inbox.",
          "CloudWatch records the run, errors and timing."
        ]
      }
    ],
    "decisions": [
      {
        "title": "SES over SendGrid",
        "body": "Kept the whole stack inside AWS and got hands-on with a service I hadn't used."
      },
      {
        "title": "Validate before send",
        "body": "Malformed input never reaches the email pipeline, so error handling stays predictable."
      },
      {
        "title": "Throttle at the edge",
        "body": "API Gateway rejects floods before Lambda ever runs, cheaper and simpler."
      },
      {
        "title": "Amplify hosting",
        "body": "Every git push redeploys automatically; no manual deploy step."
      }
    ],
    "learnings": [
      {
        "title": "SES starts in sandbox mode",
        "body": "It silently only sends to verified addresses until you request production access, emails just never arrive otherwise."
      },
      {
        "title": "CloudWatch is passive by design",
        "body": "It records, it doesn't act. More surveillance camera than security gate, great for diagnosing, useless for prevention."
      },
      {
        "title": "Throttling belongs at the edge",
        "body": "Configuring burst limits on API Gateway is both more efficient and easier to maintain than rate-limiting in code."
      },
      {
        "title": "Early validation means cleaner logs",
        "body": "Rejecting bad input up front meant far fewer surprise SES errors downstream."
      }
    ],
    "next": [
      "Honeypot / invisible CAPTCHA spam protection",
      "Move SES out of sandbox for arbitrary recipients",
      "CloudWatch alarms on elevated error rates"
    ]
  },
  {
    "slug": "image-labeler",
    "number": "02",
    "title": "AI Image Label Generator",
    "tag": "LIVE DEMO · AI",
    "cardCta": "Live demo · write-up",
    "blurb": "Drop in any image and get labels and confidence scores from Amazon Rekognition, my first step into AI on the cloud.",
    "stack": "S3 presigned · Lambda · Rekognition · API Gateway",
    "tagline": "Upload any image and get back what's in it, labels, confidence scores and scene context, straight from Amazon Rekognition.",
    "repo": "https://github.com/nsepvo/aws-image-label-generator",
    "demo": "https://staging.d3w1w0m6iehn9k.amplifyapp.com/",
    "overview": "Everyday objects aren't always easy to name. This tool lets anyone drop in an image and instantly see what a computer-vision model detects, no account, no install. It was my first real integration with an AI service.",
    "services": [
      {
        "name": "AWS Amplify",
        "role": "Frontend hosting with automatic CI/CD."
      },
      {
        "name": "API Gateway",
        "role": "Public endpoint that fronts the Lambda logic."
      },
      {
        "name": "AWS Lambda",
        "role": "Generates presigned URLs and calls Rekognition."
      },
      {
        "name": "Amazon S3",
        "role": "Stores uploads, filled via browser-direct presigned URLs."
      },
      {
        "name": "Rekognition",
        "role": "Returns detected labels, confidence scores and scene context."
      }
    ],
    "flow": [
      {
        "heading": "Upload to result",
        "steps": [
          "The frontend asks API Gateway for a presigned upload URL.",
          "Lambda generates a temporary presigned S3 URL.",
          "The browser uploads the image straight to S3, bypassing Lambda.",
          "The frontend sends the S3 object key to Lambda.",
          "Lambda calls Rekognition with just that key.",
          "Rekognition returns labels and confidence scores.",
          "The frontend renders the results."
        ]
      }
    ],
    "decisions": [
      {
        "title": "Presigned uploads",
        "body": "Lambda's 6MB payload cap makes it a poor file proxy; the browser uploads direct to S3 at any size instead."
      },
      {
        "title": "Rekognition",
        "body": "Managed AI with no model to train, a clear, approachable entry point into ML on AWS."
      },
      {
        "title": "Amplify over raw S3 hosting",
        "body": "Automatic redeploys on every push kept the loop fast during active development."
      },
      {
        "title": "Pass keys, not files",
        "body": "Lambda hands Rekognition an S3 bucket and key, not the bytes, the services do the rest."
      }
    ],
    "learnings": [
      {
        "title": "Presigned URLs are more powerful than they look",
        "body": "Storage handles the upload directly, which removes size limits and keeps Lambda focused on logic instead of proxying files."
      },
      {
        "title": "Rekognition needs zero ML knowledge",
        "body": "Key in, clean JSON of labels and scores out, surprisingly approachable for a first AI integration."
      },
      {
        "title": "AWS services talk to each other natively",
        "body": "No download-and-re-upload; passing a bucket and key simplifies the code a lot."
      },
      {
        "title": "CORS bites at the S3 / API Gateway boundary",
        "body": "Browser-direct uploads and API calls both need explicit CORS; regional endpoint mismatches were the main source of errors."
      }
    ],
    "next": [
      "Swap in a more capable model for fine-grained labels",
      "S3 lifecycle policies to prevent storage abuse",
      "User-set minimum confidence threshold"
    ]
  },
  {
    "slug": "url-shortener",
    "number": "03",
    "title": "URL Shortener",
    "tag": "LIVE DEMO",
    "cardCta": "Live demo · write-up",
    "blurb": "Long links become short ones, with atomic conditional writes, custom aliases, TTL expiry and global edge delivery.",
    "stack": "DynamoDB · CloudFront · API Gateway · Lambda · S3",
    "tagline": "Long links become short, shareable ones, with atomic writes, custom aliases, expiry and global edge delivery.",
    "repo": "https://github.com/nsepvo/aws-url-shortener",
    "demo": "https://d3hohcnfpufdrr.cloudfront.net/",
    "overview": "Built mainly to get deep with DynamoDB and multi-service architecture, with a focus on data integrity, atomic operations and edge delivery. The kind of project where the interesting problems hide in the edge cases.",
    "services": [
      {
        "name": "CloudFront",
        "role": "Global edge delivery and HTTPS termination."
      },
      {
        "name": "API Gateway",
        "role": "Public REST API with throttling and burst limits."
      },
      {
        "name": "AWS Lambda",
        "role": "Backend logic across three Python functions."
      },
      {
        "name": "DynamoDB",
        "role": "Stores short codes mapped to long URLs."
      },
      {
        "name": "Amazon S3",
        "role": "Hosts the static frontend and assets."
      }
    ],
    "flow": [
      {
        "heading": "Creating a short URL",
        "steps": [
          "The user submits a long URL and an optional custom alias.",
          "Lambda checks DynamoDB for the alias.",
          "A conditional write inserts the item only if the code is free.",
          "The short URL is returned to the frontend."
        ]
      },
      {
        "heading": "Following a short URL",
        "steps": [
          "The user hits a short link; CloudFront forwards to API Gateway.",
          "The redirect Lambda reads the item and checks expiry manually.",
          "If valid, it returns a 302 and atomically increments the click count.",
          "If expired or missing, it returns an appropriate error."
        ]
      }
    ],
    "decisions": [
      {
        "title": "DynamoDB over RDS",
        "body": "A short code mapping to a long URL is a natural key-value fit, no relational overhead needed."
      },
      {
        "title": "Conditional writes",
        "body": "Duplicate prevention happens atomically in the database, closing the read-check-write race window."
      },
      {
        "title": "302 over 301",
        "body": "301s are cached permanently by browsers, bypassing Lambda and breaking analytics and expiry."
      },
      {
        "title": "Manual TTL check",
        "body": "DynamoDB's built-in TTL can lag up to 48h; a timestamp check in Lambda guarantees expired links never redirect."
      }
    ],
    "learnings": [
      {
        "title": "Atomic writes belong in the database, not your code",
        "body": "Moving the integrity check into a single conditional DynamoDB operation was a real shift, it lives where it can actually be guaranteed."
      },
      {
        "title": "DynamoDB TTL isn't instant",
        "body": "Items are marked for deletion when the timestamp passes, but physical removal can lag; the redirect Lambda has to check expiry itself."
      },
      {
        "title": "Config must match across every function",
        "body": "With three Lambdas sharing configuration, one env-var typo caused silent failures that were harder to trace than code bugs."
      },
      {
        "title": "Reading DynamoDB responses takes adjustment",
        "body": "Early errors came from misreading the response shape, not the table config. Once it clicked, parsing became predictable."
      }
    ],
    "next": [
      "Cognito accounts + personal link management",
      "Click analytics over time",
      "QR code per short link",
      "URL validation and blocklisting"
    ]
  },
  {
    "slug": "price-tracker",
    "number": "04",
    "title": "AWS Price Tracker",
    "tag": "SCHEDULED",
    "cardCta": "Write-up",
    "blurb": "Watches a product page on a schedule and emails me when the price shifts 10%+, and shouts if the tracker itself breaks.",
    "stack": "EventBridge · Lambda · DynamoDB · SNS",
    "tagline": "Watches a product page on a schedule and emails me when the price moves 10% or more, and shouts if the tracker itself breaks.",
    "repo": "https://github.com/nsepvo/aws-price-tracker",
    "demo": "",
    "overview": "Built to understand scheduled workloads and the real, practical differences between AWS's overlapping scheduling services, the sort of distinction you only learn by hitting it.",
    "services": [
      {
        "name": "EventBridge Scheduler",
        "role": "Triggers the Lambda check on a fixed interval, every 3 days."
      },
      {
        "name": "AWS Lambda",
        "role": "Fetches the page, parses the price, compares and alerts."
      },
      {
        "name": "DynamoDB",
        "role": "Stores the last known price per product URL."
      },
      {
        "name": "Amazon SNS",
        "role": "Publishes price alerts as email notifications."
      },
      {
        "name": "AWS IAM",
        "role": "Scoped, resource-specific permissions between services."
      }
    ],
    "flow": [
      {
        "heading": "A scheduled check",
        "steps": [
          "Scheduler invokes the Lambda on a fixed interval.",
          "Lambda fetches the product page with a browser-like User-Agent.",
          "The price is parsed out of the HTML and cleaned to a number.",
          "Lambda reads the last known price from DynamoDB.",
          "If it moved 10%+ either way, SNS emails an alert.",
          "The current price is written back, overwriting the old one."
        ]
      },
      {
        "heading": "When something breaks",
        "steps": [
          "If the fetch fails or the price can't be found, it's treated as a broken tracker, not a missed check.",
          "SNS immediately alerts that the tracker itself needs attention.",
          "No price is written on a failed run, there's nothing valid to store."
        ]
      }
    ],
    "decisions": [
      {
        "title": "On-demand DynamoDB",
        "body": "Usage is tiny and infrequent, so paying per request beats reserving idle capacity."
      },
      {
        "title": "URL as partition key",
        "body": "Uniquely identifies each product and scales to many with no schema change."
      },
      {
        "title": "10% alert threshold",
        "body": "Filters out rounding and coupon noise while sitting at the low edge of a genuine sale."
      },
      {
        "title": "Alert on failure too",
        "body": "A silently broken tracker looks exactly like a price that never changes, so failure is its own alert."
      }
    ],
    "learnings": [
      {
        "title": "EventBridge Scheduler is not the same as Rules",
        "body": "Lambda's trigger wizard only recognises Rules; a Schedule has to be granted invoke permission manually via a resource-based policy."
      },
      {
        "title": "IAM permissions are additive",
        "body": "Attaching a scoped policy alongside a broader one doesn't restrict access, the broader policy stays in effect until removed."
      },
      {
        "title": "DynamoDB needs Decimal, not float",
        "body": "Python floats aren't valid attribute values, so numbers must be converted to Decimal on write and back on read."
      },
      {
        "title": "Broken code can still pass early tests",
        "body": "A bad SNS value went unnoticed because the first run only stored a price and never reached the alert path."
      }
    ],
    "next": [
      "Adapt to a real product page incl. bot detection",
      "Multi-product via the URL partition key",
      "SMS alerts through SNS",
      "CloudWatch alarm on repeated failures",
      "Infrastructure-as-code with SAM or CDK"
    ]
  }
]
